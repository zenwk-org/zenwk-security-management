name: SonarCloud Analysis

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
    contents: read
    packages: read
    
jobs:
  sonar:
    uses: zenwk-org/zenwk-workflows/.github/workflows/sonar-services-java.yml@main
    with:
      projectKey: ZenWkZen_zenwk-security-management
      organization: zenwk
      microserviceDir: ./zenwk-security
    secrets: inherit # herencia implícita de secretos