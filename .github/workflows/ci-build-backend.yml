name: CI - Build - Backend

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - test
      - main
  push:
    branches:
      - develop
      - test
      - main
      
permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build:
    uses: zenwk-org/zenwk-workflows/.github/workflows/zenwk-ci-build-docker-template.yml@main
    with:
      service_name: zenwk-security
      image_name: zenwk-org/zenwk-security
      dockerfile_path: zenwk-security/src/main/resources/docker/Dockerfile
      build_context: zenwk-security
      publish_image: ${{ github.event_name == 'push' }}
    secrets:
      GRADLE_PLUGIN_TOKEN: ${{ secrets.GRADLE_PLUGIN_TOKEN }}

  trigger-cd:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CD workflow for current branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering CD for branch ${GITHUB_REF_NAME}"
          gh workflow run "CD - Deploy - Backend" \
          --repo "${GITHUB_REPOSITORY}" \
          --ref "${GITHUB_REF_NAME}"
